name: Heller-Dirac Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-pfk-dependency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Heller-Dirac
        uses: actions/checkout@v4
        with:
          path: Heller-Dirac

      - name: Checkout Heller-Godel at pinned commit
        uses: actions/checkout@v4
        with:
          repository: SocioProphet/Heller-Godel
          ref: 988307215ad38ccb16514311222184a1b757752b
          path: Heller-Godel

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate PFK dependency and v0.2 apparatus plus gate-minimality guard
        env:
          HELLER_GODEL_ROOT: ${{ github.workspace }}/Heller-Godel
        run: |
          cd Heller-Dirac
          make validate
